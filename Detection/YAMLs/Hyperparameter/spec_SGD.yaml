# Optimizer
optimizer: SGD
lr0: 0.01
lrf: 0.1
momentum: 0.937
weight_decay: 0.0005

# Training schedule
warmup_epochs: 5.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# Loss weights (heavily favor box and localization for small objects)
box: 12.0                 # Very high box loss
cls: 0.3                  # Lower class loss (single class: bee)
dfl: 2.5                  # High DFL for precise localization